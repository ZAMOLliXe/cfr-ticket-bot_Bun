name: Verifica locuri CFR

on:
  schedule:
    # ruleaza la fiecare 15 minute
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check:
     runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependinte
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ruleaza verificarea
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPARTURE_SLUG: "Bucuresti-(toate-statiile)"
          ARRIVAL_SLUG: "Suceava-(toate-statiile)"
          TRAVEL_DATE: "03.07.2026"
          TRAIN_NUMBER: "553"
          TARGET_CLASS: "clasa a 2-a"
        run: python check_tickets.py

      - name: Salveaza screenshot de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          retention-days: 3
